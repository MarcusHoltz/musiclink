services:
  musiclink:
    build: .
    container_name: musiclink
    restart: unless-stopped

    environment:
      MUSICLINK_DATA: /config
      # filebrowser for new shares starts here
      SOURCE_DIR: "${SOURCE_DIR:-/mnt/user}"
      # musiclink ouput directory holding your symlinks
      TARGET_DIR: "${TARGET_DIR:-/mnt/user/CuratedMusic}"
      # change the default credentials below
      TTYD_CREDENTIAL: "${TTYD_CREDENTIAL:-admin:changeme}"
      # change if 7681 taken
      WEB_PORT: "${WEB_PORT:-7681}"

    ports:
      - "${WEB_PORT:-7681}:${WEB_PORT:-7681}"

    volumes:
      # config + manifest - leave alone
      - musiclink-config:/config

      # SOURCE SHARES
      # host path = container path - or symlinks break
      - /mnt/user/FlacLibrary:/mnt/user/FlacLibrary:ro
      - /mnt/user/NewDownloads:/mnt/user/NewDownloads:ro
      - /mnt/user/Soundtracks:/mnt/user/Soundtracks:ro

      # Target_Dir share - where symlinks are created
      - /mnt/user/CuratedMusic:/mnt/user/CuratedMusic

    healthcheck:
      test: ["CMD", "curl", "-fsSk", "https://localhost:${WEB_PORT:-7681}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Navidrome (or any app that reads your output share) ──────────────────────
  # symlinks in CuratedMusic point back to source shares like /mnt/user/FlacLibrary
  # navidrome must have those same source shares mounted or it cannot follow them
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    ports:
      - "4533:4533"
    environment:
      ND_MUSICFOLDER: /music
      ND_DATAFOLDER: /data
    volumes:
      - navidrome-data:/data
      # output share  navidrome reads from here
      - /mnt/user/CuratedMusic:/music:ro
      # source shares  must match musiclink above  symlinks point here
      - /mnt/user/FlacLibrary:/mnt/user/FlacLibrary:ro
      - /mnt/user/NewDownloads:/mnt/user/NewDownloads:ro
      - /mnt/user/Soundtracks:/mnt/user/Soundtracks:ro

volumes:
  musiclink-config:
    driver: local
  navidrome-data:
    driver: local
